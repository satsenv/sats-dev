site_name: sats-dev
site_description: "Custom devenv modules for Bitcoin and related services"
docs_dir: "src"
dev_addr: "0.0.0.0:8000"
strict: true
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - content.lazy
    - navigation.sections
    - navigation.top
    - search.share
    - toc.follow

plugins:
  search: {}
  include-markdown: {}

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Reference:
    - Module options: reference/options.md
